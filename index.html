<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>嘿嘿代購 - K-POP Goods & More</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* 隱藏捲軸與過渡動畫輔助 */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .view-section { display: none; animation: fadeIn 0.5s ease-in-out; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="min-h-screen flex flex-col bg-stone-50/50 font-sans selection:bg-rose-200 selection:text-rose-900">

    <nav class="sticky top-0 z-40 bg-white/90 backdrop-blur-md border-b border-rose-100 shadow-sm">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center cursor-pointer" onclick="switchView('home')">
                    <span class="text-2xl font-bold text-rose-500 tracking-wider">嘿嘿代購</span>
                    <span class="ml-2 text-xs text-rose-300 hidden sm:block">K-POP Goods & More</span>
                </div>
                <div class="hidden md:flex space-x-8 items-center">
                    <button onclick="switchView('home')" id="nav-home" class="text-sm text-rose-500 font-semibold">首頁</button>
                    <button onclick="switchView('products')" id="nav-products" class="text-sm text-gray-600 hover:text-rose-400">商品一覽</button>
                    <button onclick="switchView('orders')" id="nav-orders" class="text-sm text-gray-600 hover:text-rose-400 hidden">訂單查詢</button>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="relative hidden sm:block">
                        <input type="text" placeholder="搜尋偶像或商品..." class="pl-8 pr-4 py-1.5 rounded-full border border-rose-200 text-sm focus:outline-none focus:border-rose-400 focus:ring-1 focus:ring-rose-400 bg-rose-50/50 w-48 transition-all">
                        <i data-lucide="search" class="w-4 h-4 text-rose-300 absolute left-2.5 top-2"></i>
                    </div>
                    <button onclick="handleUserClick()" class="p-2 text-gray-600 hover:text-rose-500 transition-colors">
                        <i data-lucide="user" class="w-5 h-5"></i>
                    </button>
                    <button onclick="toggleCart(true)" class="p-2 text-gray-600 hover:text-rose-500 transition-colors relative">
                        <i data-lucide="shopping-bag" class="w-5 h-5"></i>
                        <span id="cart-badge" class="hidden absolute top-0 right-0 inline-flex items-center justify-center px-1.5 py-0.5 text-xs font-bold leading-none text-white transform translate-x-1/4 -translate-y-1/4 bg-rose-500 rounded-full">0</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-1">
        <section id="view-home" class="view-section active space-y-12 pb-12">
            <div class="relative bg-rose-100/50 overflow-hidden">
                <div class="max-w-6xl mx-auto px-4 py-16 flex flex-col md:flex-row items-center">
                    <div class="md:w-1/2 z-10 space-y-6">
                        <span class="px-3 py-1 bg-white text-rose-500 text-xs font-bold rounded-full">NEW ARRIVAL</span>
                        <h1 class="text-4xl font-extrabold text-stone-800 leading-tight">找到屬於你的 <br><span class="text-rose-500">閃耀時刻 ✨</span></h1>
                        <p class="text-stone-600 text-lg">最新韓國偶像周邊、演唱會周邊預購中。我們提供最安心的代購服務。</p>
                        <button onclick="switchView('products')" class="px-8 py-3.5 bg-rose-500 text-white rounded-full font-medium flex items-center">立即逛逛 <i data-lucide="chevron-right" class="w-5 h-5 ml-1"></i></button>
                    </div>
                    <div class="md:w-1/2 mt-10 md:mt-0">
                        <img src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819?auto=format&fit=crop&q=80&w=600&h=600" class="w-full max-w-md mx-auto rounded-2xl shadow-2xl rotate-3">
                    </div>
                </div>
            </div>
            <div class="max-w-6xl mx-auto px-4">
                <h2 class="text-2xl font-bold text-stone-800 mb-8">熱門預購推薦</h2>
                <div id="home-products-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6"></div>
            </div>
        </section>

        <section id="view-products" class="view-section max-w-6xl mx-auto px-4 py-12">
            <h1 class="text-3xl font-bold text-stone-800 mb-8">所有商品</h1>
            <div id="all-products-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6"></div>
        </section>

        <section id="view-checkout" class="view-section max-w-3xl mx-auto px-4 py-16">
            <div class="bg-white rounded-3xl shadow-xl text-center overflow-hidden">
                <div class="bg-rose-50 py-12 flex flex-col items-center">
                    <i data-lucide="check-circle" class="w-16 h-16 text-rose-500 mb-4"></i>
                    <h1 class="text-3xl font-bold">訂單已建立！</h1>
                    <p>編號：<span class="text-rose-600 font-mono">ORD-20260422-999</span></p>
                </div>
                <div class="p-8 text-left">
                    <h2 class="text-lg font-bold text-rose-800 mb-4">買方需知：請先匯款「訂金」</h2>
                    <p class="mb-4">為保障雙方權益，代購商品需先支付商品總額之 50% 作為訂金。</p>
                    <div class="bg-white border p-4 rounded-xl mb-6">
                        <p class="text-xl font-bold text-rose-500">應繳金額: NT$ 1,500</p>
                        <p>帳號: 808 玉山銀行 9876-5432-1012-34</p>
                    </div>
                    <button onclick="switchView('orders')" class="px-8 py-3 bg-rose-500 text-white rounded-xl">查看訂單</button>
                </div>
            </div>
        </section>

        <section id="view-orders" class="view-section max-w-5xl mx-auto px-4 py-12">
            <h1 class="text-2xl font-bold mb-8">我的訂單查詢</h1>
            <div id="orders-container" class="bg-white rounded-2xl shadow-sm border p-4 divide-y"></div>
        </section>
    </main>

    <footer class="bg-stone-50 border-t pt-12 pb-8 mt-auto text-center text-stone-500 text-sm">
        <p>© 2026 嘿嘿代購 HeiHei Shop. All rights reserved.</p>
    </footer>

    <div id="cart-backdrop" class="hidden fixed inset-0 bg-stone-900/20 backdrop-blur-sm z-50" onclick="toggleCart(false)"></div>
    <div id="cart-drawer" class="fixed inset-y-0 right-0 w-full max-w-sm bg-white shadow-2xl z-50 transform translate-x-full transition-transform duration-300 flex flex-col">
        <div class="px-6 py-4 border-b flex justify-between items-center bg-rose-50/50">
            <h2 class="text-lg font-bold flex items-center"><i data-lucide="shopping-bag" class="mr-2 text-rose-500"></i>購物車</h2>
            <button onclick="toggleCart(false)"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-4"></div>
        <div id="cart-footer" class="p-6 bg-stone-50 border-t hidden">
            <div class="flex justify-between font-bold text-lg mb-4"><span>總計</span><span id="cart-total" class="text-rose-500">NT$ 0</span></div>
            <button onclick="handleCheckout()" class="w-full py-3 bg-rose-500 text-white rounded-xl font-medium">前往結帳</button>
        </div>
    </div>

    <div id="auth-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-stone-900/40 backdrop-blur-sm">
        <div class="bg-white rounded-2xl p-8 w-full max-w-md">
            <div class="flex justify-between mb-6">
                <h2 class="text-2xl font-bold">會員登入</h2>
                <button onclick="toggleAuth(false)"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            <form onsubmit="handleLogin(event)" class="space-y-4">
                <input type="email" required value="user@example.com" class="w-full px-4 py-2 border rounded-lg" placeholder="電子信箱">
                <input type="password" required value="password" class="w-full px-4 py-2 border rounded-lg" placeholder="密碼">
                <button type="submit" class="w-full py-3 bg-rose-500 text-white rounded-lg">登入</button>
            </form>
        </div>
    </div>

    <script>
        // 資料狀態定義
        const PRODUCTS = [
            { id: 1, name: "NewJeans 2nd EP 'Get Up' 限量黑膠", price: 1250, type: "預購", image: "https://images.unsplash.com/photo-1619983081563-430f53602796?auto=format&fit=crop&q=80&w=400&h=400" },
            { id: 2, name: "IVE 官方應援燈 (Light Stick)", price: 1100, type: "現貨", image: "https://images.unsplash.com/photo-1514525253161-7a46d19cd819?auto=format&fit=crop&q=80&w=400&h=400" },
            { id: 3, name: "SEVENTEEN TOUR 'FOLLOW' 紀念T恤", price: 950, type: "預購", image: "https://images.unsplash.com/photo-1576566588028-4147f3842f27?auto=format&fit=crop&q=80&w=400&h=400" },
            { id: 4, name: "aespa Drama 專輯小卡套組 (隨機)", price: 450, type: "現貨", image: "https://images.unsplash.com/photo-1544531586-fde5298cdd40?auto=format&fit=crop&q=80&w=400&h=400" }
        ];
        const MOCK_ORDERS = [
            { id: "ORD-20260422-001", date: "2026-04-22", total: 1250, status: "待付訂金", items: ["NewJeans 2nd EP 'Get Up' 限量黑膠"] }
        ];

        let cart = [];
        let isLoggedIn = false;

        // 初始化渲染
        function init() {
            lucide.createIcons();
            renderProductGrid('home-products-grid', PRODUCTS.slice(0, 4));
            renderProductGrid('all-products-grid', PRODUCTS);
            renderOrders();
        }

        // 渲染商品卡片
        function renderProductGrid(containerId, data) {
            const container = document.getElementById(containerId);
            container.innerHTML = data.map(p => `
                <div class="bg-white rounded-2xl overflow-hidden shadow-sm border flex flex-col">
                    <div class="relative aspect-square">
                        <span class="absolute top-3 left-3 px-2 py-1 bg-white/90 text-rose-500 text-xs font-bold rounded-md">${p.type}</span>
                        <img src="${p.image}" class="w-full h-full object-cover">
                    </div>
                    <div class="p-4 flex flex-col flex-1">
                        <h3 class="text-sm font-medium mb-2">${p.name}</h3>
                        <p class="text-rose-500 font-bold mb-4">NT$ ${p.price}</p>
                        <button onclick="addToCart(${p.id})" class="mt-auto w-full py-2 bg-rose-50 text-rose-600 rounded-lg text-sm hover:bg-rose-500 hover:text-white">加入購物車</button>
                    </div>
                </div>
            `).join('');
        }

        // 渲染訂單
        function renderOrders() {
            const container = document.getElementById('orders-container');
            container.innerHTML = MOCK_ORDERS.map(o => `
                <div class="py-4 flex justify-between items-center">
                    <div>
                        <p class="font-mono text-sm">${o.id}</p>
                        <p class="text-xs text-stone-400">${o.date} | ${o.items[0]}</p>
                    </div>
                    <div class="text-right">
                        <p class="font-bold">NT$ ${o.total}</p>
                        <span class="text-xs bg-amber-100 text-amber-700 px-2 py-1 rounded-full">${o.status}</span>
                    </div>
                </div>
            `).join('');
        }

        // 購物車邏輯
        function addToCart(productId) {
            const product = PRODUCTS.find(p => p.id === productId);
            cart.push(product);
            updateCartUI();
            toggleCart(true);
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function updateCartUI() {
            const badge = document.getElementById('cart-badge');
            const itemsContainer = document.getElementById('cart-items');
            const footer = document.getElementById('cart-footer');
            const totalEl = document.getElementById('cart-total');

            badge.innerText = cart.length;
            badge.style.display = cart.length > 0 ? 'inline-flex' : 'none';

            if (cart.length === 0) {
                itemsContainer.innerHTML = '<p class="text-center text-stone-400 mt-10">購物車空空的耶</p>';
                footer.style.display = 'none';
            } else {
                itemsContainer.innerHTML = cart.map((item, idx) => `
                    <div class="flex space-x-4 border-b pb-4">
                        <img src="${item.image}" class="w-16 h-16 rounded-md object-cover">
                        <div class="flex-1">
                            <p class="text-sm line-clamp-2">${item.name}</p>
                            <div class="flex justify-between items-center mt-2">
                                <span class="font-bold">NT$ ${item.price}</span>
                                <button onclick="removeFromCart(${idx})" class="text-xs text-rose-500">移除</button>
                            </div>
                        </div>
                    </div>
                `).join('');
                footer.style.display = 'block';
                totalEl.innerText = `NT$ ${cart.reduce((sum, p) => sum + p.price, 0)}`;
            }
        }

        // 視圖切換邏輯
        function switchView(viewId) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.getElementById(`view-${viewId}`).classList.add('active');
            
            // 更新 Navbar 狀態
            ['home', 'products', 'orders'].forEach(id => {
                const btn = document.getElementById(`nav-${id}`);
                if(btn) {
                    btn.className = (id === viewId) ? 'text-sm text-rose-500 font-semibold' : 'text-sm text-gray-600 hover:text-rose-400';
                }
            });
        }

        // 互動狀態切換
        function toggleCart(show) {
            document.getElementById('cart-drawer').style.transform = show ? 'translateX(0)' : 'translateX(100%)';
            document.getElementById('cart-backdrop').style.display = show ? 'block' : 'none';
        }

        function toggleAuth(show) {
            document.getElementById('auth-modal').style.display = show ? 'flex' : 'none';
        }

        function handleUserClick() {
            isLoggedIn ? switchView('orders') : toggleAuth(true);
        }

        function handleLogin(e) {
            e.preventDefault();
            isLoggedIn = true;
            document.getElementById('nav-orders').classList.remove('hidden');
            toggleAuth(false);
            alert('登入成功！');
        }

        function handleCheckout() {
            if (!isLoggedIn) return toggleAuth(true);
            cart = [];
            updateCartUI();
            toggleCart(false);
            switchView('checkout');
        }

        // 啟動
        window.onload = init;
    </script>
</body>
</html>
